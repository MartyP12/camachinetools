<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="public/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>camachinetools</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="contact" value="contact" />

      <div class="hidden"> 
        <label for="bot-field">Don't fill this out if you're human:</label>
        <input name="bot-field" />
      </div>

      <div>
        <label for="contact-name">Your Name</label>
        <input id="contact-name" name="name" type="text" placeholder="John Smith" />
      </div>

      <div>
        <label for="contact-company">Company</label>
        <input id="contact-company" name="company" type="text" placeholder="Acme Manufacturing" />
      </div>

      <div>
        <label for="contact-phone">Phone</label>
        <input id="contact-phone" name="phone" type="tel" placeholder="+1 (___) ___-____" />
      </div>

      <div>
        <label for="contact-email">Email</label>
        <input id="contact-email" name="email" type="email" placeholder="you@company.com" />
      </div>

      <div>
        <label for="contact-subject">Subject / Product</label>
        <select id="contact-subject" name="subject">
          <option value="">Select a subject...</option>
          <option value="New Equipment Inquiry">New Equipment Inquiry</option>
          <option value="Used Equipment Inquiry">Used Equipment Inquiry</option>
          <option value="Spare Parts Request">Spare Parts Request</option>
          <option value="Service / Repair">Service / Repair</option>
          <option value="General Question">General Question</option>
        </select>
      </div>

      <div>
        <label for="contact-message">Message / Order Details</label>
        <textarea
          id="contact-message"
          name="message"
          placeholder="Include SKU, quantity, specifications, timeline, or any other relevant details..."
        ></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>
  </body>
</html>
